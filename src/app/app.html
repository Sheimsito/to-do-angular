<nav class="bg-white shadow mb-6">
  <div class="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
    <span class="font-bold text-gray-800">Todo App 📝</span>
    <div class="flex gap-4 items-center">
      <a routerLink="/" routerLinkActive="text-blue-500 font-bold" 
        [routerLinkActiveOptions]="{ exact: true }"
        class="text-gray-600 hover:text-blue-500 transition">
        Inicio
      </a>
      <a routerLink="/about" routerLinkActive="text-blue-500 font-bold"
        class="text-gray-600 hover:text-blue-500 transition">
        About
      </a>
      @if (authService.estaLogueado()) {
        <button (click)="authService.logout()"
          class="text-red-500 hover:text-red-600 transition">
          Logout
        </button>
      } @else {
        <a routerLink="/login" class="text-gray-600 hover:text-blue-500 transition">
          Login
        </a>
      }
    </div>
  </div>
</nav>

<router-outlet />
